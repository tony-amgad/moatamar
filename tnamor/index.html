<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة خريطة الصناديق السحرية 🗺️</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
        }

        /* حاوية العناوين للخدمة */
        .header-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            padding: 12px 30px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            margin-bottom: 10px;
            border: 2px solid #fff;
            margin-top: 20px;
        }

        .header-container h2 {
            color: #2c3e50;
            margin: 0 0 5px 0;
            font-size: 1.5rem;
        }

        .header-container h3 {
            color: #ff4757;
            margin: 0 0 5px 0;
            font-size: 1.2rem;
        }

        .header-container .carnival-title {
            color: #2ed573;
            font-size: 1.3rem;
            font-weight: bold;
            margin: 0;
            background: #eccc68;
            padding: 2px 15px;
            border-radius: 10px;
            display: inline-block;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        h1 {
            color: #2f3542;
            text-shadow: 1px 1px #fff;
            margin: 10px 0 5px 0;
            font-size: 1.8rem;
        }

        .top-bar {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .score-board {
            font-size: 1.3rem;
            background: white;
            padding: 8px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            color: #2ed573;
            font-weight: bold;
        }

        /* زر المساعدة */
        .help-btn {
            background: linear-gradient(135deg, #ff9f43 0%, #ffb142 100%);
            color: white;
            border: none;
            padding: 8px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }

        .help-btn:active {
            transform: scale(0.95);
        }

        /* حاوية اللعبة المربعة */
        .game-area {
            position: relative;
            width: 90vw;
            height: 90vw;
            max-width: 600px;
            max-height: 600px;
            background-image: url('find.png'); 
            background-size: cover;
            background-position: center;
            border: 8px solid #fff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            overflow: hidden;
            cursor: pointer;
        }

        /* تأثير اهتزاز الشاشة والوميض الأحمر عند الضغط الخاطئ */
        .shake {
            animation: shakeScreen 0.4s ease-in-out;
        }

        @keyframes shakeScreen {
            0% { transform: translateX(0); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
            10% { transform: translateX(-10px); background-color: rgba(255, 0, 0, 0.2); }
            30% { transform: translateX(10px); }
            50% { transform: translateX(-10px); }
            70% { transform: translateX(10px); }
            90% { transform: translateX(-5px); }
            100% { transform: translateX(0); background-color: transparent; }
        }

        /* الصناديق المخفية والمنطقة الحساسة */
        .hidden-trigger {
            position: absolute;
            width: 45px;  
            height: 45px;
            cursor: pointer;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 2; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: background-color 0.3s, width 0.3s, height 0.3s;
        }

        /* تأثير الوميض عند طلب المساعدة */
        .hint-flash {
            animation: flashContainer 1s ease-in-out;
        }

        @keyframes flashContainer {
            0%, 100% { background-color: transparent; box-shadow: none; }
            50% { background-color: rgba(255, 234, 167, 0.8); box-shadow: 0 0 20px 10px #ffeaa7; }
        }

        /* تعديل حجم علامة الاكتشاف الصح والدائرة لتكون صغيرة جداً ورقيقة */
        .discovered {
            width: 24px !important;   /* تصغير عرض الدائرة */
            height: 24px !important;  /* تصغير ارتفاع الدائرة */
            font-size: 0.9rem !important; /* تصغير حجم علامة الصح */
            background-color: rgba(46, 213, 115, 0.9) !important;
            border: 1.5px solid white;
            pointer-events: none; 
            animation: popCheck 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popCheck {
            0% { transform: translate(-50%, -50%) scale(0); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        /* النافذة المنبثقة المصممة كصندوق PNG */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 5;
            backdrop-filter: blur(3px);
        }

        .popup-box {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            background-image: url('YOUR_BOX_IMAGE.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            width: 320px;
            height: 350px;
            z-index: 10;
            text-align: center;
            animation: bounceIn 0.4s forwards cubic-bezier(0.175, 0.885, 0.32, 1.25);
        }

        @keyframes bounceIn {
            to { transform: translate(-50%, -50%) scale(1); }
        }

        .box-content {
            margin-top: 130px; 
            padding: 0 20px;
        }

        .box-content h2 {
            font-size: 1.6rem;
            color: #ff4757;
            margin: 10px 0;
            background: rgba(255,255,255,0.8);
            padding: 5px;
            border-radius: 10px;
            display: inline-block;
        }

        .btn-container {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
        }

        .btn {
            padding: 10px 20px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .btn-good { background-color: #2ed573; }
        .btn-bad { background-color: #ff4757; }

        .star {
            position: absolute;
            width: 15px; height: 15px;
            background-color: #fffa65;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: fall 1.5s linear infinite;
        }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }
    </style>
</head>
<body>

    
    <h1>🏴‍☠️ ابحث عن الصناديق المخفية! 🏴‍☠️</h1>
    
    <div class="top-bar">
        <div class="score-board">الصناديق المكتشفة: <span id="score">0</span> من 15 🌟</div>
        <button class="help-btn" onclick="giveHint()">مساعدة من صديق 💡</button>
    </div>
    
    <div class="game-area" id="gameArea"></div>
    
    <div class="header-container">
        <h2>⛪ كنيسة مارمينا الأميرية</h2>
        <h3>👼 خدمة ملائكة</h3>
        <p class="carnival-title">🎪 كرنفال 1</p>
    </div>
    
    <div class="overlay" id="overlay"></div>
    <div class="popup-box" id="popupBox">
        <div class="box-content">
            <h2 id="wordDisplay">تحميل...</h2>
            <div class="btn-container">
                <button class="btn btn-good" onclick="checkAnswer('good')">🍬 حلوة</button>
                <button class="btn btn-bad" onclick="checkAnswer('bad')">🗑️ مش حلوة</button>
            </div>
        </div>
    </div>

    <script>
        const words = [
            { text: "شكراً لك ❤️", type: "good" }, { text: "أنت ذكي 🧠", type: "good" },
            { text: "من فضلك ✨", type: "good" }, { text: "أنت رائع ⭐", type: "good" },
            { text: "أحبك يا بطل 🥰", type: "good" }, { text: "مساعد الآخرين 🤝", type: "good" },
            { text: "الابتسامة الجميلة 😊", type: "good" }, { text: "قول الصدق 💡", type: "good" },
            { text: "صوت عالي ومزعج 🗣️", type: "bad" }, { text: "كسلان ومش نشيط 😴", type: "bad" },
            { text: "كتابة على الحائط 📝", type: "bad" }, { text: "عدم سماع الكلام 🙉", type: "bad" },
            { text: "رمي الأوراق أرضاً 🗑️", type: "bad" }, { text: "مقاطعة الحديث 🤫", type: "bad" },
            { text: "الغضب الشديد 😡", type: "bad" }
        ];

        const boxPositions = [
            { x: 62, y: 92 }, { x: 82, y: 94 }, { x: 53, y: 82 },
            { x: 79, y: 80 }, { x: 96, y: 75 }, { x: 94, y: 57 },
            { x: 74, y: 62 }, { x: 56, y: 66 }, { x: 31, y: 72 },
            { x: 11, y: 80 }, { x: 11, y: 48 }, { x: 60, y: 36 },
            { x: 46, y: 18 }, { x: 8, y: 12 }, { x: 94, y: 30 }
        ];

        let score = 0;
        let currentWord = null;
        let currentTriggerElement = null;

        const gameArea = document.getElementById('gameArea');
        const popupBox = document.getElementById('popupBox');
        const overlay = document.getElementById('overlay');
        const wordDisplay = document.getElementById('wordDisplay');
        const scoreDisplay = document.getElementById('score');

        function playSound(type) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);

            if (type === 'click') {
                osc.frequency.setValueAtTime(450, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } else if (type === 'correct') {
                osc.frequency.setValueAtTime(523, ctx.currentTime);
                osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
                osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                osc.start(); osc.stop(ctx.currentTime + 0.3);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(60, ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.4, ctx.currentTime);
                osc.start(); osc.stop(ctx.currentTime + 0.3);
            } else if (type === 'hint') {
                osc.frequency.setValueAtTime(300, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                osc.start(); osc.stop(ctx.currentTime + 0.2);
            }
        }

        function initGame() {
            gameArea.addEventListener('click', function(e) {
                if (e.target === gameArea) {
                    playSound('wrong');
                    gameArea.classList.remove('shake');
                    void gameArea.offsetWidth; 
                    gameArea.classList.add('shake');
                }
            });

            boxPositions.forEach((pos, index) => {
                const trigger = document.createElement('div');
                trigger.className = 'hidden-trigger';
                trigger.style.left = pos.x + '%';
                trigger.style.top = pos.y + '%';
                trigger.dataset.wordIndex = index % words.length;
                trigger.dataset.solved = "false";

                trigger.addEventListener('click', function(e) {
                    e.stopPropagation(); 
                    playSound('click');
                    currentTriggerElement = trigger;
                    const wIndex = parseInt(trigger.dataset.wordIndex);
                    currentWord = words[wIndex];
                    
                    wordDisplay.innerText = currentWord.text;
                    popupBox.style.display = 'block';
                    overlay.style.display = 'block';
                });

                gameArea.appendChild(trigger);
            });
        }

        function checkAnswer(choice) {
            popupBox.style.display = 'none';
            overlay.style.display = 'none';

            if (choice === currentWord.type) {
                playSound('correct');
                score++;
                scoreDisplay.innerText = score;
                createStarShower();
                
                // تعديل هنا ليظهر علامة صح فقط ✔️ وتفعيل كلاس التصغير الجديد
                if (currentTriggerElement) {
                    currentTriggerElement.className = 'hidden-trigger discovered';
                    currentTriggerElement.innerText = '✔️';
                    currentTriggerElement.dataset.solved = "true";
                }

                if (score === 15) {
                    setTimeout(() => { alert('🎉 ممتاز يا بطل! لقد جمعت كل الصناديق! 🏆'); }, 500);
                }
            } else {
                playSound('wrong');
                gameArea.classList.add('shake');
                setTimeout(() => gameArea.classList.remove('shake'), 400);
                alert('حاول تاني يا شاطر! ركز في الكلمة 🤔');
            }
        }

        function giveHint() {
            const activeBoxes = Array.from(document.querySelectorAll('.hidden-trigger')).filter(box => box.dataset.solved === "false");
            
            if (activeBoxes.length > 0) {
                playSound('hint');
                const targetBox = activeBoxes[0];
                targetBox.classList.add('hint-flash');
                
                setTimeout(() => {
                    targetBox.classList.remove('hint-flash');
                }, 1000);
            } else {
                alert('لقد عثرت على جميع الصناديق بالفعل يا بطل! 🌟');
            }
        }

        function createStarShower() {
            for(let i=0; i<25; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.animationDelay = Math.random() * 0.4 + 's';
                document.body.appendChild(star);
                setTimeout(() => star.remove(), 1500);
            }
        }

        gameArea.addEventListener('animationend', () => {
            gameArea.classList.remove('shake');
        });

        initGame();
    </script>
</body>
</html>
