<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة تجميع آية إيليا النبي</title>
    <style>
        :root {
            --primary-color: #f39c12;
            --bg-color: #fdf5e6;
            --card-back: #8e44ad;
            --card-front: #fff;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--text-color);
            text-align: center;
            margin-bottom: 5px;
        }

        p.subtitle {
            color: #7f8c8d;
            margin-bottom: 15px;
            text-align: center;
        }

        /* تنسيق لوحة تجميع الآية */
        .verse-tracker {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            padding: 15px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 2px dashed #bdc3c7;
            max-width: 600px;
        }

        .word-slot {
            padding: 8px 15px;
            background-color: #ecf0f1;
            color: transparent; /* إخفاء النص في البداية */
            border-radius: 5px;
            font-size: 1.2rem;
            font-weight: bold;
            border: 1px solid #ccc;
            transition: all 0.5s ease;
            position: relative;
        }

        .word-slot::after {
            content: '?';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: #95a5a6;
        }

        /* تنسيق الكلمة عند اكتشافها */
        .word-slot.revealed {
            background-color: #f1c40f;
            color: var(--text-color);
            border-color: #e67e22;
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
            transform: scale(1.1);
        }

        .word-slot.revealed::after {
            display: none; /* إخفاء علامة الاستفهام */
        }

        .word-separator {
            font-size: 1.5rem;
            color: var(--text-color);
            font-weight: bold;
        }

        /* تنسيق لوحة اللعب */
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 600px;
            perspective: 1000px;
        }

        .card {
            width: 90px;
            height: 120px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            cursor: pointer;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border: 2px solid #ddd;
        }

        .card-back {
            background-color: var(--card-back);
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.1) 10px, rgba(255,255,255,0.1) 20px);
            color: white;
            font-size: 2rem;
        }

        .card-front {
            background-color: var(--card-front);
            transform: rotateY(180deg);
            font-weight: bold;
            color: #333;
            text-align: center;
            padding: 5px;
        }

        .card-front .icon {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .card-front .text {
            font-size: 0.9rem;
        }

        /* رسالة الفوز */
        .message-box {
            margin-top: 30px;
            padding: 20px;
            background-color: #2ecc71;
            color: white;
            border-radius: 10px;
            text-align: center;
            display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            max-width: 600px;
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 1.1rem;
            background-color: #fff;
            color: #2ecc71;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #f1f1f1;
        }

        @media (max-width: 500px) {
            .game-board { grid-template-columns: repeat(3, 1fr); }
            .card { width: 80px; height: 110px; }
            .card-front .text { font-size: 0.8rem; }
            .card-front .icon { font-size: 1.5rem; }
            .word-slot { font-size: 1rem; padding: 5px 10px; }
        }
    </style>
</head>
<body>

    <h1>لعبة الذاكرة: مخزن الأرملة</h1>
    <p class="subtitle">طابق البطاقات لتكتشف الآية المخفية</p>

    <!-- لوحة تتبع الآية -->
    <div class="verse-tracker" id="verseTracker">
        <span class="word-slot" id="slot-1">كُوَّارُ</span>
        <span class="word-slot" id="slot-2">الدَّقِيقِ</span>
        <span class="word-slot" id="slot-3">لاَ يَفْرُغُ</span>
        <span class="word-separator">،</span>
        <span class="word-slot" id="slot-4">وَكُوزُ</span>
        <span class="word-slot" id="slot-5">الزَّيْتِ</span>
        <span class="word-slot" id="slot-6">لاَ يَنْقُصُ</span>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <div class="message-box" id="messageBox">
        <h2>🎉 عمل رائع! اكتملت المعجزة! 🎉</h2>
        <button onclick="initGame()">العب مرة أخرى</button>
    </div>

    <script>
        // إعداد نظام الصوت المدمج (بدون ملفات خارجية)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone(frequency, type, duration) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = type;
            oscillator.frequency.value = frequency;
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            oscillator.stop(audioCtx.currentTime + duration);
        }

        function playSound(action) {
            switch(action) {
                case 'flip': 
                    playTone(300, 'sine', 0.1); // صوت قلب البطاقة
                    break;
                case 'match': 
                    playTone(600, 'triangle', 0.1); 
                    setTimeout(() => playTone(800, 'triangle', 0.2), 100); // صوت التطابق الصحيح
                    break;
                case 'mismatch': 
                    playTone(200, 'sawtooth', 0.3); // صوت خطأ
                    break;
                case 'win': 
                    // نغمة الفوز
                    [440, 554, 659, 880].forEach((freq, i) => {
                        setTimeout(() => playTone(freq, 'sine', 0.4), i * 150);
                    });
                    break;
            }
        }

        // بيانات البطاقات
        const cardsData = [
            { text: "كُوَّارُ", icon: "🏺", id: 1 },
            { text: "الدَّقِيقِ", icon: "🌾", id: 2 },
            { text: "لاَ يَفْرُغُ", icon: "🔄", id: 3 },
            { text: "وَكُوزُ", icon: "🍶", id: 4 },
            { text: "الزَّيْتِ", icon: "🫒", id: 5 },
            { text: "لاَ يَنْقُصُ", icon: "💧", id: 6 }
        ];

        let board = document.getElementById('gameBoard');
        let messageBox = document.getElementById('messageBox');
        let cards = [];
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let matchedPairs = 0;

        function initGame() {
            board.innerHTML = '';
            messageBox.style.display = 'none';
            matchedPairs = 0;
            hasFlippedCard = false;
            lockBoard = false;
            firstCard = null;
            secondCard = null;

            // إعادة ضبط لوحة الآية
            for(let i=1; i<=6; i++) {
                let slot = document.getElementById('slot-' + i);
                slot.classList.remove('revealed');
                // إعادة تأثير التكبير لوضعه الطبيعي
                slot.style.transform = "scale(1)"; 
            }

            // مضاعفة البطاقات وخلطها
            cards = [...cardsData, ...cardsData];
            cards.sort(() => Math.random() - 0.5);

            cards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('card');
                cardElement.dataset.id = card.id;

                cardElement.innerHTML = `
                    <div class="card-face card-back">❓</div>
                    <div class="card-face card-front">
                        <div class="icon">${card.icon}</div>
                        <div class="text">${card.text}</div>
                    </div>
                `;

                cardElement.addEventListener('click', flipCard);
                board.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            playSound('flip');
            this.classList.add('flipped');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.id === secondCard.dataset.id;

            if (isMatch) {
                disableCards();
            } else {
                unflipCards();
            }
        }

        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            
            let matchedId = firstCard.dataset.id;
            revealWord(matchedId); // كشف الكلمة في لوحة الآية

            matchedPairs++;
            
            if (matchedPairs === cardsData.length) {
                setTimeout(() => {
                    playSound('win');
                    messageBox.style.display = 'block';
                }, 800);
            } else {
                setTimeout(() => playSound('match'), 300);
            }

            resetBoard();
        }

        function revealWord(id) {
            let slot = document.getElementById('slot-' + id);
            slot.classList.add('revealed');
            
            // إضافة تأثير حركي خفيف للكلمة عند ظهورها
            setTimeout(() => {
                slot.style.transform = "scale(1)";
            }, 300);
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => playSound('mismatch'), 400); // صوت الخطأ

            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        // بدء اللعبة
        initGame();
    </script>
</body>
</html>
